services:
  - type: web
    name: hall3-return-points
    runtime: node
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: bash scripts/start-production.sh
    healthCheckPath: /signin
    envVars:
      - key: NODE_ENV
        value: production
      # Ephemeral local uploads on free tier (lost on redeploy). For persistence,
      # set S3_* vars below and USE_LOCAL_STORAGE=false in the Render dashboard.
      - key: USE_LOCAL_STORAGE
        value: "true"
      - key: ENABLE_QUEUE
        value: "false"
      - key: RUN_SEED
        value: "true"
      - key: AUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hall3-points-db
          property: connectionString
      - key: AUTH_URL
        sync: false

databases:
  - name: hall3-points-db
    plan: free
    databaseName: hall3_points
    user: hall3
