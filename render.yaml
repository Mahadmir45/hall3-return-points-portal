services:
  - type: web
    name: hall3-return-points
    runtime: node
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: bash scripts/start-production.sh
    healthCheckPath: /signin
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_LOCAL_STORAGE
        value: "true"
      - key: ENABLE_QUEUE
        value: "false"
      - key: RUN_SEED
        value: "true"
      - key: AUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hall3-points-db
          property: connectionString
      - key: AUTH_URL
        sync: false

databases:
  - name: hall3-points-db
    plan: free
    databaseName: hall3_points
    user: hall3
